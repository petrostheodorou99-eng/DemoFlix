<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΑΝΔΡΟΥΛΑ | Demoflix</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
text-align:center;
}

.logo{
font-size:70px;
font-weight:bold;
color:#E50914;
margin-bottom:20px;
}

h1{
font-size:60px;
margin-bottom:20px;
}

p{
font-size:24px;
margin-bottom:40px;
}

button{
padding:18px 40px;
font-size:24px;
background:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

#proposal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

#proposal h2{
font-size:70px;
margin-bottom:20px;
color:#fff;
}

#proposal p{
font-size:36px;
color:#E50914;
}
</style>
</head>

<body>

<div class="hero">

<div class="logo">
DEMOFLIX
</div>

<h1>ΑΝΔΡΟΥΛΑ ❤️</h1>

<p>Η πιο όμορφη ιστορία αγάπης...</p>

<button onclick="playMovie()">
▶ PLAY
</button>

</div>

<div id="proposal">

<h2>
Ανδρούλα...
</h2>

<p>
ΘΑ ΜΕ ΠΑΝΤΡΕΥΤΕΙΣ; 💍
</p>

</div>

<script>

function playMovie(){

document.querySelector(".hero").style.display="none";

document.getElementById("proposal").style.display="flex";

}

</script>

</body>
</html>
