<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ΑΝΔΡΟΥΛΑ | DemoFlix</title>
<style>
:root{--red:#e50914;--bg:#050505;--muted:#c7c7c7}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:white;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}.hidden{display:none!important}button{font:inherit}.intro{position:fixed;inset:0;z-index:50;background:#000;display:grid;place-items:center}.intro-logo{font-size:clamp(46px,12vw,130px);font-weight:900;letter-spacing:-5px;color:var(--red);text-shadow:0 0 25px #e5091466;animation:intro 2.7s ease forwards}.skip{position:absolute;right:20px;bottom:25px;background:#151515aa;color:#fff;border:1px solid #777;padding:10px 16px;border-radius:4px}.home{min-height:100vh;background:linear-gradient(90deg,#000 0%,#000c 38%,transparent 72%),linear-gradient(0deg,#050505 0%,transparent 45%),url('assets/photo02.jpg') center 35%/cover no-repeat;display:flex;align-items:center;padding:90px 7vw 60px}.nav{position:absolute;top:0;left:0;right:0;padding:22px 7vw;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#000c,transparent)}.brand{color:var(--red);font-weight:900;font-size:clamp(25px,5vw,44px);letter-spacing:-2px}.profile{width:34px;height:34px;border-radius:4px;background:linear-gradient(135deg,#e50914,#7a0006);display:grid;place-items:center;font-weight:bold}.hero{max-width:700px}.original{font-weight:800;letter-spacing:5px;color:#ddd}.title{font-size:clamp(50px,10vw,110px);line-height:.9;margin:10px 0 18px;font-weight:900;text-shadow:0 3px 18px #000}.meta{display:flex;gap:12px;flex-wrap:wrap;color:#eee;font-weight:700}.match{color:#46d369}.desc{font-size:clamp(17px,2.4vw,23px);line-height:1.45;max-width:610px;text-shadow:0 2px 8px #000;margin:18px 0 28px}.play{border:0;border-radius:5px;padding:14px 26px;background:white;color:black;font-weight:800;font-size:20px;cursor:pointer}.play:hover{background:#ddd}.movie{position:fixed;inset:0;background:#000;z-index:40;overflow:hidden}.slide,.video-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.4s ease}.slide.active,.video-slide.active{opacity:1}.slide img,.video-slide video{width:100%;height:100%;object-fit:cover}.slide.active img{animation:ken 7s linear forwards}.shade{position:absolute;inset:0;background:linear-gradient(0deg,#000c 0%,transparent 48%,#0005 100%)}.caption{position:absolute;left:7vw;right:7vw;bottom:11vh;text-align:center;font-size:clamp(25px,5vw,56px);font-weight:800;text-shadow:0 3px 18px #000;animation:caption 1.2s ease}.progress{position:absolute;left:5%;right:5%;bottom:25px;height:4px;background:#ffffff35}.bar{height:100%;width:0;background:var(--red)}.sound{position:absolute;right:18px;top:18px;z-index:3;background:#0009;color:#fff;border:1px solid #aaa;border-radius:50%;width:44px;height:44px}.proposal{position:fixed;inset:0;z-index:60;background:radial-gradient(circle at center,#420006,#000 62%);display:grid;place-items:center;text-align:center;padding:25px}.proposal-inner{max-width:900px}.ring{font-size:65px;animation:pulse 1.2s infinite}.proposal h1{font-size:clamp(42px,10vw,100px);margin:10px 0;color:#fff}.proposal h2{font-size:clamp(28px,7vw,68px);margin:0 0 30px}.yes{background:var(--red);color:#fff;border:0;border-radius:7px;padding:17px 42px;font-size:clamp(24px,5vw,42px);font-weight:900;box-shadow:0 0 35px #e5091466;cursor:pointer}.final-message{font-size:clamp(25px,5vw,48px);line-height:1.35}.heart{position:fixed;bottom:-40px;z-index:80;animation:fly 4s linear forwards;pointer-events:none}@keyframes intro{0%{opacity:0;transform:scale(.75)}35%{opacity:1;transform:scale(1)}75%{opacity:1;filter:brightness(1.5)}100%{opacity:0;transform:scale(1.12)}}@keyframes ken{from{transform:scale(1)}to{transform:scale(1.11)}}@keyframes caption{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:none}}@keyframes pulse{50%{transform:scale(1.18)}}@keyframes fly{to{transform:translateY(-115vh) rotate(540deg);opacity:0}}@media(max-width:650px){.home{align-items:flex-end;background-position:58% center;padding-bottom:85px}.home:after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,#050505 0%,transparent 68%);pointer-events:none}.hero{position:relative;z-index:2}.title{font-size:54px}.desc{font-size:17px}.caption{bottom:13vh}.slide img,.video-slide video{object-position:center}}
</style>
</head>
<body>
<section id="intro" class="intro"><div class="intro-logo">DEMOFLIX</div><button class="skip" id="skip">Παράλειψη intro</button></section>
<section id="home" class="home hidden"><nav class="nav"><div class="brand">DEMOFLIX</div><div class="profile">A</div></nav><div class="hero"><div class="original">A DEMOFLIX ORIGINAL</div><h1 class="title">ΑΝΔΡΟΥΛΑ</h1><div class="meta"><span class="match">99% Match</span><span>2026</span><span>Romance</span><span>Adventure</span><span>Forever</span></div><p class="desc">Η πιο όμορφη ιστορία που έζησα ποτέ. Ένα ταξίδι γεμάτο στιγμές, χαμόγελα και ένα τέλος που είναι μόνο η αρχή.</p><button id="play" class="play">▶ PLAY</button></div></section>
<section id="movie" class="movie hidden"><button id="sound" class="sound">🔊</button><div id="stage"></div><div class="progress"><div id="bar" class="bar"></div></div></section>
<section id="proposal" class="proposal hidden"><div class="proposal-inner"><div id="question"><div class="ring">💍</div><h1>ΑΝΔΡΟΥΛΑ</h1><h2>ΘΑ ΜΕ ΠΑΝΤΡΕΥΤΕΙΣ;</h2><button id="yes" class="yes">ΝΑΙ ❤️</button></div><div id="answer" class="final-message hidden">Η καλύτερη ιστορία της ζωής μας<br><b>μόλις ξεκινά.</b> ❤️</div></div></section>
<script>
const slides=[
[photo01.jpg','Εσύ ήσουν πάντα η πιο όμορφη εικόνα...'],
[photo03.jpg','Μαζί γελάσαμε...'],
[photo04.jpg','Ταξιδέψαμε...'],
[photo08.jpg','Και γεμίσαμε τη ζωή μας στιγμές.'],
[photo07.jpg','Κάθε δρόμος μαζί σου έγινε ανάμνηση.'],
[photo10.jpg','Κάθε μέρος έγινε πιο όμορφο...'],
[photo12.jpg','...επειδή ήσουν εκεί.'],
[video','Και θέλω όλα όσα έρχονται...'],
[photo05.jpg','...να τα ζήσω δίπλα σου.'],
[photo02.jpg','Γιατί το αγαπημένο μου μέρος...'],
[photo06.jpg','...είναι εκεί που είμαστε μαζί.']
];
const intro=document.getElementById('intro'),home=document.getElementById('home'),movie=document.getElementById('movie'),stage=document.getElementById('stage'),bar=document.getElementById('bar');let muted=false,audio;
function showHome(){intro.classList.add('hidden');home.classList.remove('hidden')}
setTimeout(showHome,2900);document.getElementById('skip').onclick=showHome;
function soundtrack(){try{const A=window.AudioContext||window.webkitAudioContext;audio=new A();const master=audio.createGain();master.gain.value=.09;master.connect(audio.destination);[110,164.81,220,329.63].forEach((f,i)=>{const o=audio.createOscillator(),g=audio.createGain();o.type=i%2?'sine':'triangle';o.frequency.value=f;g.gain.value=.08/(i+1);o.connect(g);g.connect(master);o.start();});}catch(e){}}
document.getElementById('play').onclick=()=>{home.classList.add('hidden');movie.classList.remove('hidden');soundtrack();run(0)};
document.getElementById('sound').onclick=()=>{muted=!muted;if(audio) muted?audio.suspend():audio.resume();document.getElementById('sound').textContent=muted?'🔇':'🔊'};
function run(i){if(i>=slides.length){movie.classList.add('hidden');document.getElementById('proposal').classList.remove('hidden');if(audio)audio.suspend();return}stage.innerHTML='';const item=slides[i];let el,duration=6500;if(item[0]==='video'){el=document.createElement('div');el.className='video-slide active';el.innerHTML=`<video autoplay muted playsinline src="assets/memory.mp4"></video><div class="shade"></div><div class="caption">${item[1]}</div>`;duration=8000;const v=el.querySelector('video');v.onloadedmetadata=()=>{duration=Math.min(Math.max(v.duration*1000,5000),14000)}}else{el=document.createElement('div');el.className='slide active';el.innerHTML=`<img src="${item[0]}" alt=""><div class="shade"></div><div class="caption">${item[1]}</div>`}stage.appendChild(el);bar.style.transition='none';bar.style.width=(i/slides.length*100)+'%';requestAnimationFrame(()=>{bar.style.transition=`width ${duration}ms linear`;bar.style.width=((i+1)/slides.length*100)+'%'});setTimeout(()=>run(i+1),duration)}
document.getElementById('yes').onclick=()=>{document.getElementById('question').classList.add('hidden');document.getElementById('answer').classList.remove('hidden');for(let i=0;i<70;i++)setTimeout(()=>{const h=document.createElement('div');h.className='heart';h.textContent=Math.random()>.25?'❤️':'💍';h.style.left=Math.random()*100+'vw';h.style.fontSize=(18+Math.random()*35)+'px';h.style.animationDuration=(2.8+Math.random()*2.8)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),6000)},i*55)};
</script>
</body>
</html>
